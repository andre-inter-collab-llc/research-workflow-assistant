# Research Workflow Assistant — Project Configuration
# Demo project: CHW Interventions for Maternal Mental Health in LMICs

research_assistant:
  tracking_location: self
  reporting_standard: prisma-2020
  project_type: systematic-review
  zotero_collection: "CHW Maternal Mental Health Review"

  authors:
    - name: "Demo Researcher"
      credentials: "PhD, MPH"
      author_id: "dr"
      corresponding: true
      email: "demo@example.org"
      orcid: "0000-0000-0000-0000"
      affiliation:
        name: "Example University School of Public Health"
        city: "Washington"
        state: "DC"
        country: "United States"

  output_defaults:
    bibliography: references.bib
    csl: ../apa.csl
    include_rwa_methods_disclosure: true
    include_rwa_acknowledgments: true

  target_date: 2026-09-30
