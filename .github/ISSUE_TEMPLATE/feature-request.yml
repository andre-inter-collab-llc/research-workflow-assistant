name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or enhancement for the Research Workflow Assistant
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the sections below to help us understand your request.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like.
      placeholder: "I would like the ability to..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the research workflow or scenario where this feature would be useful.
      placeholder: "When I'm doing a systematic review, I need to..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of RWA does this relate to?
      options:
        - MCP Server (database search)
        - MCP Server (reference management)
        - MCP Server (project tracking)
        - Copilot Agent
        - Template (Quarto/Markdown)
        - Documentation
        - CI/CD / Build
        - Other
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have an idea for how this could be implemented, describe it here.
      placeholder: "One approach could be..."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: "I've tried..."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references.
    validations:
      required: false
