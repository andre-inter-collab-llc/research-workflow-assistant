name: "\U0001F41B Bug Report"
description: Report a bug or unexpected behavior in the Research Workflow Assistant
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "When I try to..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Open Copilot Chat and invoke @systematic-reviewer
        2. Ask it to search PubMed for...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of RWA does this relate to?
      options:
        - MCP Server (database search)
        - MCP Server (reference management)
        - MCP Server (project tracking)
        - Copilot Agent
        - Template (Quarto/Markdown)
        - Setup / Configuration
        - Documentation
        - CI/CD / Build
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: copilot-model
    attributes:
      label: Copilot Model
      description: Which LLM model were you using in GitHub Copilot?
      placeholder: "e.g., Claude Opus 4.6, GPT-5.3-Codex"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or log output.
    validations:
      required: false
