# Research Workflow Assistant — Project Configuration
#
# Place this file in the root of your research project directory.
# The assistant reads it to understand project-level preferences.
#
# All fields are optional. Missing fields use defaults shown in comments.

research_assistant:
  # Where tracking data is stored relative to this file:
  #   "self"        — project-tracking/ and review-tracking/ inside this project (default)
  #   "<path>"      — absolute or relative path to an external tracking directory
  tracking_location: self

  # Reporting standard used for this project:
  #   prisma-2020, prisma-scr, moose, cochrane, none
  reporting_standard: prisma-2020

  # Zotero collection name for this project's references (optional)
  # zotero_collection: "My Review"

  # Bibliography management backend:
  #   "zotero"  — Use Zotero (Web API + local) for reference management (default)
  #   "local"   — Use the built-in bibliography-manager MCP server (no Zotero needed)
  #
  # The "local" backend stores everything in data/search_results.db and supports
  # BibTeX/RIS import, PDF attachment, notes, and annotations. References can be
  # migrated to Zotero later with bib_migrate_to_zotero.
  bibliography_backend: zotero

  # Override the Zotero data directory for this project (optional).
  # If blank, inherits from ZOTERO_DATA_DIR env var or auto-detects.
  # zotero_data_dir: "C:\Users\you\Zotero"

  # Project type: systematic-review, scoping-review, meta-analysis, general-research
  project_type: systematic-review

  # Default author metadata for manuscripts and reports created in this project.
  # Use setup-level default_author as the starting point, then tailor per project.
  # All fields are optional except name when you add an author entry.
  authors: []
  # Example:
  # authors:
  #   - name: "Lead Author"
  #     credentials: "MPH"
  #     author_id: "lav"
  #     corresponding: true
  #     email: "author@example.org"
  #     orcid: "0000-0000-0000-0000"
  #     profile_url: "https://example.org"
  #     affiliation:
  #       name: "Organization"
  #       city: "City"
  #       state: "State / Province"
  #       country: "Country"
  #       url: "https://organization.example"

  # Defaults for cite-bearing outputs created in this project.
  #
  # Citation style: set `csl` to the filename of a CSL style file.
  # During project creation the chosen .csl file is copied into the project
  # directory so the project stays self-contained.
  #
  # Resolution chain (agents follow this order):
  #   1. This project's output_defaults.csl
  #   2. User default in .rwa-user-config.yaml → default_citation_style
  #   3. Fallback: apa.csl
  #
  # Bundled styles (in repo-root csl/):
  #   apa, vancouver, vancouver-superscript, american-medical-association,
  #   bmj, nature, national-library-of-medicine, ieee, harvard-cite-them-right,
  #   chicago-author-date-17th-edition, chicago-fullnote-bibliography
  #
  # Browse 10 000+ additional styles: https://www.zotero.org/styles
  output_defaults:
    bibliography: references.bib
    csl: apa.csl
    include_rwa_methods_disclosure: true
    include_rwa_acknowledgments: true

  # Target completion date (YYYY-MM-DD, optional)
  # target_date: 2025-12-31
